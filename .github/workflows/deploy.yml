name: Deploy

on:
  push:
    branches: [ "main", "dev" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

      - name: Sync deploy files to server
        run: |
          rsync -avz --delete \
            -e "ssh" \
            --include='Dockerfile' \
            --include='docker-compose.yml' \
            --include='docker-compose.staging.yml' \
            --include='nginx.conf' \
            --include='package.json' \
            --include='package-lock.json' \
            --include='server/***' \
            --include='src/***' \
            --include='public/***' \
            --include='index.html' \
            --include='vite.config.ts' \
            --include='tsconfig*.json' \
            --include='tailwind.config.js' \
            --include='postcss.config.js' \
            --include='eslint.config.js' \
            --exclude='*' \
            ./ ${{ secrets.USER }}@${{ secrets.HOST }}:${{ secrets.TARGET_DIR }}/

      - name: Build & restart on server (branch-aware)
        run: |
          ssh ${{ secrets.USER }}@${{ secrets.HOST }} << 'EOF'
          set -e
          cd ${{ secrets.TARGET_DIR }}
          BRANCH="${{ github.ref_name }}"
          if [ "$BRANCH" = "main" ]; then
            docker-compose -p portfolio-prod down --remove-orphans || true
            docker rm -f portfolio-web 2>/dev/null || true
            docker-compose -p portfolio-prod build --no-cache
            docker-compose -p portfolio-prod up -d --force-recreate --remove-orphans
          else
            docker-compose -p portfolio-staging -f docker-compose.staging.yml down --remove-orphans || true
            docker rm -f portfolio-web-staging 2>/dev/null || true
            docker-compose -p portfolio-staging -f docker-compose.staging.yml build --no-cache
            docker-compose -p portfolio-staging -f docker-compose.staging.yml up -d --force-recreate --remove-orphans
          fi
          docker system prune -f || true
          EOF
